spring:
  redis:
    host: localhost
    port: 6379
    password: 888888
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8      # 连接池最大连接数
        max-idle: 8        # 连接池最大空闲连接数
        min-idle: 0        # 连接池最小空闲连接数
        max-wait: -1ms     # 连接池最大阻塞等待时间（使用负值表示没有限制）

sa-token:
  # token名称 (同时也是cookie名称)
  token-name: satoken
  # token有效期，单位：秒，默认30天 (2592000秒)
  timeout: 2592000
  # token临时有效期 (指定时间内无操作就视为token过期) -1代表不限制
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: true
  # token风格 (可选值: uuid, simple-uuid, random-32, random-64, random-128, tik)
  token-style: uuid
  # 是否输出操作日志
  is-log: false
