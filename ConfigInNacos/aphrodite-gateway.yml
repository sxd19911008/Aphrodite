server:
  port: 9000

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务路由
        - id: aphrodite-auth
          uri: lb://aphrodite-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        # 保险服务路由
        - id: aphrodite-insurance
          uri: lb://aphrodite-insurance
          predicates:
            - Path=/api/insurance/**
          filters:
            - StripPrefix=1
